services:
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file:
      - server/.env
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/openpumta
      FRONTEND_URL: http://localhost
      BACKEND_URL: http://localhost/api
      # FRONTEND_URL: https://openpumta.com
      # BACKEND_URL: https://openpumta.com/api
      PORT: 4000
    depends_on:
      - db
    restart: always

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: user
      POSTGRES_DB: openpumta
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: next-app/dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost/api
        # NEXT_PUBLIC_BACKEND_URL: https://openpumta.com/api
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost/api
      # NEXT_PUBLIC_BACKEND_URL: https://openpumta.com/api
    env_file:
      - next-app/.env
    depends_on:
      - api
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    restart: always

volumes:
  postgres_data:
