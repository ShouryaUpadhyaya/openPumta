services:
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file:
      - server/.env
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/openpumta
      FRONTEND_URL: https://openpumta.com
      BACKEND_URL: https://openpumta.com/api
      PORT: 4000
    depends_on:
      - db
    restart: unless-stopped
    ports:
      - '127.0.0.1:4000:4000'

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: user
      POSTGRES_DB: openpumta
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: next-app/Dockerfile
    env_file:
      - next-app/.env
    environment:
      NEXT_PUBLIC_BACKEND_URL: https://openpumta.com/api
    depends_on:
      - api
    restart: unless-stopped
    ports:
      - '127.0.0.1:3000:3000'
  redis:
    image: redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
